# Single entrypoint for the whole monorepo. Run `task` to list.
# https://taskfile.dev
version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install all toolchains (pnpm + uv) and git hooks
    cmds:
      - pnpm install
      - pnpm exec lefthook install
      - echo "Run service-specific setup once services are scaffolded."

  up:
    desc: Bring up the backend stack (db + mock-netsuite + intelligence)
    cmds:
      - docker compose --profile full up --build db mock-netsuite intelligence

  down:
    desc: Tear down the stack
    cmds:
      - docker compose --profile full down

  lint:
    desc: Lint + format-check everything
    cmds:
      - pnpm exec biome check .

  fmt:
    desc: Auto-format everything
    cmds:
      - pnpm exec biome format --write .

  test:
    desc: Run all test suites
    cmds:
      - echo "Wired per service as they are scaffolded — see docs/roadmap.md."
